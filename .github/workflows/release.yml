# Release workflow - publishes to npm
name: Release

permissions:
  contents: write

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    # Skip release commits to avoid infinite loop (only applies to push events)
    if: "github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run lint
      - run: bun run typecheck
      - run: bun test
        env:
          CI: DisableCallingClaude

  release:
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup SSH for deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Configure git for SSH
        run: git remote set-url origin git@github.com:ChrisTowles/towles-tool.git

      - uses: ./.github/actions/setup

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Bump version
        run: bunx bumpp ${{ inputs.bump_type || 'patch' }} --yes --no-commit --no-tag --no-push

      - name: Sync plugin versions
        run: bun run version:sync

      - name: Get version
        id: version
        run: echo "version=$(cat package.json | jq -r .version)" >> $GITHUB_OUTPUT

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit --no-verify -m "chore: release v${{ steps.version.outputs.version }}"
          git tag -f v${{ steps.version.outputs.version }}
          git push
          git push --tags --force

      - name: Publish to npm
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if npm view @towles/tool@$VERSION version 2>/dev/null; then
            echo "Version $VERSION already published — skipping"
          else
            npm publish --access public --provenance
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete v${{ steps.version.outputs.version }} --yes 2>/dev/null || true
          gh release create v${{ steps.version.outputs.version }} --generate-notes
