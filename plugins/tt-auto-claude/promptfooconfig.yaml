# promptfoo config for testing tt-auto-claude plugin files.
# Uses the "echo" provider to render content without calling an LLM,
# then asserts on the rendered text to verify structure and content.
#
# Run: pnpm dlx promptfoo eval -c plugins/tt-auto-claude/promptfooconfig.yaml

description: tt-auto-claude Plugin Tests

providers:
  - echo

prompts:
  - "{{prompt_content}}"

tests:
  # ── skills/auto-claude/SKILL.md ──────────────────────────────────

  - description: "auto-claude skill: describes 4 pipeline steps"
    vars:
      prompt_content: file://skills/auto-claude/SKILL.md
    assert:
      - type: icontains
        value: "plan"
      - type: icontains
        value: "implement"
      - type: icontains
        value: "simplify"
      - type: icontains
        value: "review"
      - type: icontains
        value: "issue-to-PR"

  - description: "auto-claude skill: covers label flow and retry behavior"
    vars:
      prompt_content: file://skills/auto-claude/SKILL.md
    assert:
      - type: icontains
        value: "auto-claude"
      - type: icontains
        value: "auto-claude-in-progress"
      - type: icontains
        value: "auto-claude-failed"
      - type: icontains
        value: "maxReviewRetries"

  - description: "auto-claude skill: documents CLI commands"
    vars:
      prompt_content: file://skills/auto-claude/SKILL.md
    assert:
      - type: icontains
        value: "tt ac --issue"
      - type: icontains
        value: "--loop"
      - type: icontains
        value: "--until plan"
      - type: icontains
        value: "tt ac list"

  # ── commands/create-issue.md ─────────────────────────────────────

  - description: "create-issue: always includes auto-claude label"
    vars:
      prompt_content: file://commands/create-issue.md
    assert:
      - type: icontains
        value: "auto-claude"
      - type: icontains
        value: "gh issue create"
      - type: icontains
        value: "label"

  - description: "create-issue: uses conventional prefix and supports batch"
    vars:
      prompt_content: file://commands/create-issue.md
    assert:
      - type: icontains
        value: "feat:"
      - type: icontains
        value: "fix:"
      - type: icontains
        value: "batch"
      - type: icontains
        value: "AskUserQuestion"

  - description: "create-issue: creates auto-claude label if missing"
    vars:
      prompt_content: file://commands/create-issue.md
    assert:
      - type: icontains
        value: "gh label create"
      - type: icontains
        value: "7C3AED"

  # ── commands/list.md ─────────────────────────────────────────────

  - description: "list: fetches issues with auto-claude label filter"
    vars:
      prompt_content: file://commands/list.md
    assert:
      - type: icontains
        value: "auto-claude"
      - type: icontains
        value: "gh issue list"
      - type: icontains
        value: "table"

  - description: "list: covers all pipeline states"
    vars:
      prompt_content: file://commands/list.md
    assert:
      - type: icontains
        value: "auto-claude-in-progress"
      - type: icontains
        value: "auto-claude-failed"
      - type: icontains
        value: "auto-claude-review"
      - type: icontains
        value: "Deduplicate"
