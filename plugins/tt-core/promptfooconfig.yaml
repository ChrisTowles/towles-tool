# promptfoo config for testing tt-core plugin commands.
# Uses the "echo" provider to render prompts without calling an LLM,
# then asserts on the rendered text to verify structure and content.
#
# Run: pnpm dlx promptfoo eval -c plugins/tt-core/promptfooconfig.yaml
# View results: pnpm dlx promptfoo view

description: tt-core Plugin Command Tests

providers:
  - echo

prompts:
  - "{{prompt_content}}"

tests:
  # ── interview-me.md ─────────────────────────────────────────────

  - description: "interview-me: asks questions in batches via AskUserQuestion"
    vars:
      prompt_content: file://commands/interview-me.md
    assert:
      - type: icontains
        value: "AskUserQuestion"
      - type: icontains
        value: "3-5 questions"
      - type: icontains
        value: "batches"
      - type: icontains
        value: "edge cases"

  - description: "interview-me: summarizes and never proposes solutions"
    vars:
      prompt_content: file://commands/interview-me.md
    assert:
      - type: icontains
        value: "Summarize after each round"
      - type: icontains
        value: "Never propose solutions"
      - type: icontains
        value: "Problem statement"
      - type: icontains
        value: "Out of scope"

  - description: "interview-me: covers key interview domains"
    vars:
      prompt_content: file://commands/interview-me.md
    assert:
      - type: icontains
        value: "User intent"
      - type: icontains
        value: "Security"
      - type: icontains
        value: "Data model"
      - type: icontains
        value: "Performance"

  # ── write-prd.md ────────────────────────────────────────────────

  - description: "write-prd: requires user stories and acceptance criteria"
    vars:
      prompt_content: file://commands/write-prd.md
    assert:
      - type: icontains
        value: "User Stories"
      - type: icontains
        value: "User stories are mandatory"
      - type: icontains
        value: "Acceptance Criteria"
      - type: icontains
        value: "testable"

  - description: "write-prd: includes PRD template sections"
    vars:
      prompt_content: file://commands/write-prd.md
    assert:
      - type: icontains
        value: "Problem Statement"
      - type: icontains
        value: "Non-Goals"
      - type: icontains
        value: "Technical Design"
      - type: icontains
        value: "Open Questions"

  - description: "write-prd: gathers context and interviews for gaps"
    vars:
      prompt_content: file://commands/write-prd.md
    assert:
      - type: icontains
        value: "Gather context"
      - type: icontains
        value: "Interview for gaps"
      - type: icontains
        value: "AskUserQuestion"
      - type: icontains
        value: "docs/plans/"

  # ── prd-to-issues.md ────────────────────────────────────────────

  - description: "prd-to-issues: creates vertical slices with gh issue create"
    vars:
      prompt_content: file://commands/prd-to-issues.md
    assert:
      - type: icontains
        value: "vertical slices"
      - type: icontains
        value: "gh issue create"
      - type: icontains
        value: "dependency order"
      - type: icontains
        value: "Acceptance Criteria"

  - description: "prd-to-issues: uses conventional type prefixes and presents for approval"
    vars:
      prompt_content: file://commands/prd-to-issues.md
    assert:
      - type: icontains
        value: "feat:"
      - type: icontains
        value: "fix:"
      - type: icontains
        value: "refactor:"
      - type: icontains
        value: "AskUserQuestion"

  - description: "prd-to-issues: suggests write-prd if no PRD exists"
    vars:
      prompt_content: file://commands/prd-to-issues.md
    assert:
      - type: icontains
        value: "/tt:write-prd"
      - type: icontains
        value: "docs/plans/"
      - type: icontains
        value: "riskiest"

  # ── tdd.md ──────────────────────────────────────────────────────

  - description: "tdd: enforces red-green-refactor loop"
    vars:
      prompt_content: file://commands/tdd.md
    assert:
      - type: icontains
        value: "Red"
      - type: icontains
        value: "Green"
      - type: icontains
        value: "Refactor"
      - type: icontains
        value: "failing test"

  - description: "tdd: never writes implementation before the test"
    vars:
      prompt_content: file://commands/tdd.md
    assert:
      - type: icontains
        value: "Never write implementation before the test"
      - type: icontains
        value: "minimum code"
      - type: icontains
        value: "confirm it fails"
      - type: icontains
        value: "confirm it passes"

  - description: "tdd: works simple to complex with final verification"
    vars:
      prompt_content: file://commands/tdd.md
    assert:
      - type: icontains
        value: "Happy path"
      - type: icontains
        value: "Edge cases"
      - type: icontains
        value: "typecheck"
      - type: icontains
        value: "lint"

  # ── improve-architecture.md ─────────────────────────────────────

  - description: "improve-architecture: analyzes for agent-friendliness"
    vars:
      prompt_content: file://commands/improve-architecture.md
    assert:
      - type: icontains
        value: "agent-friendliness"
      - type: icontains
        value: "Tight coupling"
      - type: icontains
        value: "Missing boundaries"
      - type: icontains
        value: "Impure functions"

  - description: "improve-architecture: uses Agent Explore and presents options"
    vars:
      prompt_content: file://commands/improve-architecture.md
    assert:
      - type: icontains
        value: "subagent_type=Explore"
      - type: icontains
        value: "AskUserQuestion"
      - type: icontains
        value: "multiSelect"
      - type: icontains
        value: "10-15"

  - description: "improve-architecture: philosophy on thin interfaces"
    vars:
      prompt_content: file://commands/improve-architecture.md
    assert:
      - type: icontains
        value: "garbage code base"
      - type: icontains
        value: "Thin interfaces"
      - type: icontains
        value: "Pure functions"
      - type: icontains
        value: "Impact"

  # ── refine-text.md ──────────────────────────────────────────────

  - description: "refine-text: fixes grammar and preserves voice"
    vars:
      prompt_content: file://commands/refine-text.md
    assert:
      - type: icontains
        value: "Grammar"
      - type: icontains
        value: "spelling"
      - type: icontains
        value: "preserve"
      - type: icontains
        value: "voice"

  - description: "refine-text: uses active voice and edits in place"
    vars:
      prompt_content: file://commands/refine-text.md
    assert:
      - type: icontains
        value: "active voice"
      - type: icontains
        value: "Edit in place"
      - type: icontains
        value: "meaning and intent"
      - type: icontains
        value: "Technical accuracy"

  - description: "refine-text: professional editor with no restructuring"
    vars:
      prompt_content: file://commands/refine-text.md
    assert:
      - type: icontains
        value: "professional editor"
      - type: icontains
        value: "don't create a new file"
      - type: icontains
        value: "Bloated sentences"

