# promptfoo config for LLM-based eval of improve-architecture command.
#
# Run: pnpm exec promptfoo eval -c plugins/tt-core/promptfooconfig.improve-architecture.yaml
# View results: pnpm dlx promptfoo view
#
# Requires: ANTHROPIC_API_KEY environment variable

description: improve-architecture Iterative Eval

providers:
  - id: anthropic:messages:claude-haiku-4-5-20251001
    config:
      max_tokens: 1024

prompts:
  - '[{"role": "system", "content": "{{system_prompt}}"}, {"role": "user", "content": "{{user_message}}"}]'

defaultTest:
  options:
    provider: anthropic:messages:claude-haiku-4-5-20251001

tests:
  # ── 1. Monolithic Express app ──────────────────────────────────
  - description: "monolith: identifies problems in single-file Express app"
    vars:
      system_prompt: file://commands/improve-architecture.md
      user_message: "Our Express app has all 40 routes in a single 2000-line server.js file. Business logic, validation, database queries, and error handling are all inline in route handlers. There are no tests."
    assert:
      - type: llm-rubric
        value: "Response identifies at least 3 concrete architectural problems (e.g., lack of separation of concerns, no service layer, no data access layer, untestable code). Suggests specific improvements, not just 'refactor it'. Does NOT immediately start writing refactored code."
      - type: not-icontains
        value: "```javascript"

  # ── 2. Microservices with tight coupling ───────────────────────
  - description: "microservices: detects tight coupling between services"
    vars:
      system_prompt: file://commands/improve-architecture.md
      user_message: "We have 8 microservices but they all share a single database, call each other synchronously via HTTP for every operation, and share TypeScript types via copy-paste. Changing one service usually requires deploying all 8."
    assert:
      - type: llm-rubric
        value: "Response identifies shared database as coupling problem. Identifies synchronous inter-service calls as a risk. Suggests concrete decoupling strategies (e.g., separate databases, async messaging, shared type packages). Prioritizes suggestions by impact."

  # ── 3. No test boundaries ──────────────────────────────────────
  - description: "no-test-boundaries: identifies untestable architecture"
    vars:
      system_prompt: file://commands/improve-architecture.md
      user_message: "Our React app has 200+ components. Every component directly calls fetch() to APIs, reads from localStorage, and accesses window.location. We can't write unit tests without mocking everything. Integration tests take 20 minutes."
    assert:
      - type: llm-rubric
        value: "Response identifies that side effects (fetch, localStorage, window) are mixed into components, making them untestable. Suggests extracting side effects into injectable services or hooks. Mentions pure functions or separation of pure logic from side effects."

  # ── 4. Business logic mixed with infrastructure ────────────────
  - description: "mixed-concerns: separates business logic from infra"
    vars:
      system_prompt: file://commands/improve-architecture.md
      user_message: "Our order processing system has business rules (pricing, discounts, tax calculation, inventory checks) directly embedded in AWS Lambda handlers alongside DynamoDB calls, SQS message parsing, and SNS publishing. Each Lambda is 500+ lines."
    assert:
      - type: llm-rubric
        value: "Response identifies business logic entangled with AWS infrastructure as the core problem. Suggests extracting pure business logic functions that can be tested without AWS. Mentions something about separating infrastructure adapters from domain logic."

  # ── 5. Well-structured app (fewer issues) ──────────────────────
  - description: "well-structured: finds fewer issues in clean architecture"
    vars:
      system_prompt: file://commands/improve-architecture.md
      user_message: "Our app uses hexagonal architecture: domain logic in pure functions, ports/adapters for I/O, dependency injection, 85% test coverage, small focused modules under 200 lines each, and clear module boundaries. Any room for improvement?"
    assert:
      - type: llm-rubric
        value: "Response acknowledges the codebase is already well-structured. Suggests fewer, more nuanced improvements rather than major refactoring. Does not invent problems that don't exist. May suggest minor refinements or optimizations."

  # ── 6. God class/object ────────────────────────────────────────
  - description: "god-class: identifies God object anti-pattern"
    vars:
      system_prompt: file://commands/improve-architecture.md
      user_message: "We have a UserManager class that handles authentication, authorization, profile management, email notifications, payment processing, audit logging, and session management. It's 3000 lines with 45 methods and gets imported by every module in the app."
    assert:
      - type: llm-rubric
        value: "Response identifies this as a God class/object anti-pattern. Suggests breaking it into focused, single-responsibility classes or modules (e.g., AuthService, NotificationService, PaymentService). Identifies the high coupling risk of everything depending on this one class."

  # ── 7. Circular dependencies ───────────────────────────────────
  - description: "circular-deps: detects circular dependency problems"
    vars:
      system_prompt: file://commands/improve-architecture.md
      user_message: "Our modules have circular imports: User imports Order, Order imports Product, Product imports Inventory, Inventory imports User. Every change triggers cascade recompilation. We can't extract any module into a separate package."
    assert:
      - type: llm-rubric
        value: "Response identifies circular dependencies as the core issue. Suggests concrete solutions like introducing interfaces, dependency inversion, or extracting shared types into a separate module. Explains how to break the cycle."

  # ── 8. Poor error handling ─────────────────────────────────────
  - description: "error-handling: identifies scattered error handling"
    vars:
      system_prompt: file://commands/improve-architecture.md
      user_message: "Error handling in our API is inconsistent: some endpoints return {error: string}, others return {message: string, code: number}. Some throw, some return null, some swallow errors silently. There's no centralized error handling. Logs are scattered across console.log, winston, and custom loggers."
    assert:
      - type: llm-rubric
        value: "Response identifies inconsistent error handling as an architectural problem. Suggests standardizing error response format, centralizing error handling (middleware or error boundary), and unifying logging. Provides concrete patterns, not just 'standardize errors'."

  # ── 9. No data access layer ────────────────────────────────────
  - description: "no-dal: identifies missing data access abstraction"
    vars:
      system_prompt: file://commands/improve-architecture.md
      user_message: "Our app has raw SQL queries scattered across 50+ files. Some use pg directly, others use knex, a few use Prisma. There's no consistent way to query data. Changing the database would require touching every file."
    assert:
      - type: llm-rubric
        value: "Response identifies the lack of a data access layer/repository pattern as the problem. Suggests consolidating behind a single abstraction. Mentions that scattered queries make it impossible to change database or add caching. Provides a concrete approach to introducing a DAL."

  # ── 10. Legacy app needing modernization ───────────────────────
  - description: "legacy: provides modernization strategy"
    vars:
      system_prompt: file://commands/improve-architecture.md
      user_message: "We have a 5-year-old Node.js app using callbacks (no promises/async-await), CommonJS require(), no TypeScript, jQuery-style DOM manipulation on the frontend, and Grunt for builds. It works but is hard to maintain and new devs struggle with it."
    assert:
      - type: llm-rubric
        value: "Response prioritizes modernization steps by impact and risk. Does not suggest rewriting everything at once. Suggests incremental migration path. Identifies which changes give the biggest improvement for AI/agent collaboration (e.g., TypeScript adoption for better tooling)."

  # ── 11. Presents options, does NOT auto-refactor ───────────────
  - description: "no-auto-refactor: presents options instead of refactoring"
    vars:
      system_prompt: file://commands/improve-architecture.md
      user_message: "Our codebase has a lot of architectural issues. The main problems are: routes mixed with business logic, no dependency injection, and tests are all end-to-end with no unit tests. Please improve the architecture."
    assert:
      - type: llm-rubric
        value: "Response presents a list of options or improvements for the user to choose from. Does NOT immediately start writing refactored code or making changes. Asks the user which improvements to prioritize or presents them as selectable options."
      - type: not-icontains
        value: "```javascript"

  # ── 12. Agent-friendliness focus ───────────────────────────────
  - description: "agent-friendly: considers AI agent collaboration"
    vars:
      system_prompt: file://commands/improve-architecture.md
      user_message: "We want to make our codebase more AI-agent friendly. Currently it's a Django monolith with 100+ models in a single models.py, views spread across 30 files with no clear naming convention, and business logic in template tags."
    assert:
      - type: llm-rubric
        value: "Response specifically addresses agent-friendliness or AI collaboration. Mentions concepts like thin interfaces, self-contained modules, pure functions, or co-located code that helps AI agents navigate. Does not just give generic architecture advice without the agent-friendliness angle."

  # ── 13. Prioritizes by impact ──────────────────────────────────
  - description: "prioritization: ranks improvements by impact and effort"
    vars:
      system_prompt: file://commands/improve-architecture.md
      user_message: "Our app has these issues: 1) No TypeScript (plain JS), 2) 15 God classes over 1000 lines each, 3) Inconsistent naming (mix of camelCase/snake_case), 4) No CI/CD pipeline, 5) Circular dependencies everywhere, 6) Console.log for all logging. Which should we fix first?"
    assert:
      - type: llm-rubric
        value: "Response ranks or prioritizes the issues by impact and effort. Does not just list them back. Explains why certain fixes should come before others. Considers which changes unlock further improvements."
