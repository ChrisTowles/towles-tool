# promptfoo config for testing auto-claude prompt templates.
# Uses the "echo" provider to render prompts without calling an LLM,
# then asserts on the rendered text to verify structure and content.
#
# Run: pnpm test:prompts
# View results: pnpm dlx promptfoo view

description: Auto-Claude Prompt Template Tests

providers:
  - echo

prompts:
  - "{{prompt_content}}"

tests:
  # ── 01_plan.prompt.md ──────────────────────────────────────────────

  - description: "plan: creates plan.md with research and design phases"
    vars:
      prompt_content: file://src/lib/auto-claude/prompt-templates/01_plan.prompt.md
    assert:
      - type: icontains
        value: "plan.md"
      - type: icontains
        value: "research"
      - type: icontains
        value: "design"
      - type: icontains
        value: "implementation checklist"
      - type: icontains
        value: "CLAUDE.md"

  - description: "plan: references issue dir, scope path, and main branch"
    vars:
      prompt_content: file://src/lib/auto-claude/prompt-templates/01_plan.prompt.md
    assert:
      - type: icontains
        value: "initial-ramblings.md"
      - type: icontains
        value: "The code lives primarily at"
      - type: icontains
        value: "base branch"

  - description: "plan: includes test strategy and risk sections"
    vars:
      prompt_content: file://src/lib/auto-claude/prompt-templates/01_plan.prompt.md
    assert:
      - type: icontains
        value: "test strategy"
      - type: icontains
        value: "risks"
      - type: icontains
        value: "edge cases"

  # ── 02_implement.prompt.md ─────────────────────────────────────────

  - description: "implement: references plan.md as sole source of truth"
    vars:
      prompt_content: file://src/lib/auto-claude/prompt-templates/02_implement.prompt.md
    assert:
      - type: icontains
        value: "plan.md"
      - type: icontains
        value: "source of truth"
      - type: icontains
        value: "completed-summary.md"

  - description: "implement: includes scope path and issue context"
    vars:
      prompt_content: file://src/lib/auto-claude/prompt-templates/02_implement.prompt.md
    assert:
      - type: icontains
        value: "The code lives primarily at"
      - type: icontains
        value: "initial-ramblings.md"
      - type: icontains
        value: "source of truth"

  - description: "implement: enforces TDD workflow and commit conventions"
    vars:
      prompt_content: file://src/lib/auto-claude/prompt-templates/02_implement.prompt.md
    assert:
      - type: icontains
        value: "red/green TDD"
      - type: icontains
        value: "feat(scope)"
      - type: icontains
        value: "Do NOT push"

  - description: "implement: requires mandatory verification"
    vars:
      prompt_content: file://src/lib/auto-claude/prompt-templates/02_implement.prompt.md
    assert:
      - type: icontains
        value: "type-check"
      - type: icontains
        value: "lint"
      - type: icontains
        value: "mandatory verification"

  # ── 03_simplify.prompt.md ──────────────────────────────────────────

  - description: "simplify: focuses on code simplification"
    vars:
      prompt_content: file://src/lib/auto-claude/prompt-templates/03_simplify.prompt.md
    assert:
      - type: icontains
        value: "code simplification"
      - type: icontains
        value: "simplify-summary.md"
      - type: icontains
        value: "behavior-preserving"

  - description: "simplify: lists simplification categories"
    vars:
      prompt_content: file://src/lib/auto-claude/prompt-templates/03_simplify.prompt.md
    assert:
      - type: icontains
        value: "dead code"
      - type: icontains
        value: "over-abstraction"
      - type: icontains
        value: "complexity"
      - type: icontains
        value: "duplication"

  - description: "simplify: requires verification after changes"
    vars:
      prompt_content: file://src/lib/auto-claude/prompt-templates/03_simplify.prompt.md
    assert:
      - type: icontains
        value: "type-check"
      - type: icontains
        value: "test"
      - type: icontains
        value: "lint"
      - type: icontains
        value: "git diff"

  - description: "simplify: references issue dir, scope path, and main branch"
    vars:
      prompt_content: file://src/lib/auto-claude/prompt-templates/03_simplify.prompt.md
    assert:
      - type: icontains
        value: "initial-ramblings.md"
      - type: icontains
        value: "The code lives primarily at"
      - type: icontains
        value: "completed-summary.md"
      - type: icontains
        value: "base branch"

  # ── 04_review.prompt.md ────────────────────────────────────────────

  - description: "review: outputs machine-parsed PASS/FAIL on first line"
    vars:
      prompt_content: file://src/lib/auto-claude/prompt-templates/04_review.prompt.md
    assert:
      - type: icontains
        value: "PASS"
      - type: icontains
        value: "FAIL"
      - type: icontains
        value: "first line"
      - type: icontains
        value: "machine-parsed"

  - description: "review: checks code quality aspects"
    vars:
      prompt_content: file://src/lib/auto-claude/prompt-templates/04_review.prompt.md
    assert:
      - type: icontains
        value: "correctness"
      - type: icontains
        value: "security"
      - type: icontains
        value: "edge cases"
      - type: icontains
        value: "test coverage"

  - description: "review: references plan and issue context"
    vars:
      prompt_content: file://src/lib/auto-claude/prompt-templates/04_review.prompt.md
    assert:
      - type: icontains
        value: "plan.md"
      - type: icontains
        value: "initial-ramblings.md"
      - type: icontains
        value: "git diff"

  - description: "review: defines PASS vs FAIL criteria"
    vars:
      prompt_content: file://src/lib/auto-claude/prompt-templates/04_review.prompt.md
    assert:
      - type: icontains
        value: "when to pass vs fail"
      - type: icontains
        value: "fundamentally broken"
      - type: icontains
        value: "confidence level"

  # ── Plugin Skills ────────────────────────────────────────────────────

  # ── skills/towles-tool/SKILL.md ──────────────────────────────────────

  - description: "towles-tool skill: name and description"
    vars:
      prompt_content: file://plugins/tt-core/skills/towles-tool/SKILL.md
    assert:
      - type: icontains
        value: "name: towles-tool"
      - type: icontains
        value: "auto-claude pipeline"
      - type: icontains
        value: "tt auto-claude"

  - description: "towles-tool skill: key commands listed"
    vars:
      prompt_content: file://plugins/tt-core/skills/towles-tool/SKILL.md
    assert:
      - type: icontains
        value: "tt gh branch"
      - type: icontains
        value: "tt journal"
      - type: icontains
        value: "tt doctor"

  - description: "towles-tool skill: auto-claude subcommands"
    vars:
      prompt_content: file://plugins/tt-core/skills/towles-tool/SKILL.md
    assert:
      - type: icontains
        value: "--loop"
      - type: icontains
        value: "--refresh"
      - type: icontains
        value: "tt ac list"

  # ── skills/qmd/SKILL.md ─────────────────────────────────────────────

  - description: "qmd skill: name and description"
    vars:
      prompt_content: file://plugins/tt-core/skills/qmd/SKILL.md
    assert:
      - type: icontains
        value: "name: qmd"
      - type: icontains
        value: "BM25"
      - type: icontains
        value: "markdown"

  - description: "qmd skill: search commands"
    vars:
      prompt_content: file://plugins/tt-core/skills/qmd/SKILL.md
    assert:
      - type: icontains
        value: "qmd search"
      - type: icontains
        value: "qmd vsearch"
      - type: icontains
        value: "qmd query"

  - description: "qmd skill: MCP server tools"
    vars:
      prompt_content: file://plugins/tt-core/skills/qmd/SKILL.md
    assert:
      - type: icontains
        value: "qmd_search"
      - type: icontains
        value: "qmd_vsearch"
      - type: icontains
        value: "qmd_query"
      - type: icontains
        value: "MCP"

  # ── skills/cc-patterns/SKILL.md ──────────────────────────────────────

  - description: "cc-patterns skill: name and description"
    vars:
      prompt_content: file://plugins/tt-core/skills/cc-patterns/SKILL.md
    assert:
      - type: icontains
        value: "name: cc-patterns"
      - type: icontains
        value: "autonomous coding tasks"
      - type: icontains
        value: "parallel sessions"

  - description: "cc-patterns skill: worktree and autonomous patterns"
    vars:
      prompt_content: file://plugins/tt-core/skills/cc-patterns/SKILL.md
    assert:
      - type: icontains
        value: "git worktree"
      - type: icontains
        value: "--dangerously-skip-permissions"
      - type: icontains
        value: "PR Reviews"

  - description: "cc-patterns skill: safety warnings"
    vars:
      prompt_content: file://plugins/tt-core/skills/cc-patterns/SKILL.md
    assert:
      - type: icontains
        value: "Never use it on your main machine"
      - type: icontains
        value: "Review output"

  # ── Plugin Commands ──────────────────────────────────────────────────

  # ── commands/refine.md ───────────────────────────────────────────────

  - description: "refine command: description and tools"
    vars:
      prompt_content: file://plugins/tt-core/commands/refine.md
    assert:
      - type: icontains
        value: "refine writing"
      - type: icontains
        value: "Read(*)"
      - type: icontains
        value: "Edit(*)"

  - description: "refine command: editing instructions"
    vars:
      prompt_content: file://plugins/tt-core/commands/refine.md
    assert:
      - type: icontains
        value: "grammar"
      - type: icontains
        value: "active voice"
      - type: icontains
        value: "author's style"

  # ── commands/refactor-claude-md.md ───────────────────────────────────

  - description: "refactor-claude-md command: title and tools"
    vars:
      prompt_content: file://plugins/tt-core/commands/refactor-claude-md.md
    assert:
      - type: icontains
        value: "refactor-claude-md"
      - type: icontains
        value: "AskUserQuestion(*)"
      - type: icontains
        value: "progressive disclosure"

  - description: "refactor-claude-md command: workflow steps"
    vars:
      prompt_content: file://plugins/tt-core/commands/refactor-claude-md.md
    assert:
      - type: icontains
        value: "Find Contradictions"
      - type: icontains
        value: "Extract Essentials"
      - type: icontains
        value: "Flag for Deletion"

  - description: "refactor-claude-md command: AGENTS.md template"
    vars:
      prompt_content: file://plugins/tt-core/commands/refactor-claude-md.md
    assert:
      - type: icontains
        value: "AGENTS.md Template"
      - type: icontains
        value: "When NOT to Split"

  # ── commands/create-auto-claude-issue.md ─────────────────────────────

  - description: "create-auto-claude-issue command: description and tools"
    vars:
      prompt_content: file://plugins/tt-core/commands/create-auto-claude-issue.md
    assert:
      - type: icontains
        value: "auto-claude label"
      - type: icontains
        value: "Bash"
      - type: icontains
        value: "AskUserQuestion"

  - description: "create-auto-claude-issue command: workflow steps"
    vars:
      prompt_content: file://plugins/tt-core/commands/create-auto-claude-issue.md
    assert:
      - type: icontains
        value: "gh issue create"
      - type: icontains
        value: "batch creation"
      - type: icontains
        value: "conventional"

  # ── commands/improve.md ──────────────────────────────────────────────

  - description: "improve command: title and tools"
    vars:
      prompt_content: file://plugins/tt-core/commands/improve.md
    assert:
      - type: icontains
        value: "improve"
      - type: icontains
        value: "AskUserQuestion(*)"
      - type: icontains
        value: "Task(*)"

  - description: "improve command: three phases"
    vars:
      prompt_content: file://plugins/tt-core/commands/improve.md
    assert:
      - type: icontains
        value: "Phase 1: Explore"
      - type: icontains
        value: "Phase 2: Identify"
      - type: icontains
        value: "Phase 3: Present"
      - type: icontains
        value: "multiSelect"

  # ── commands/simplify.md ─────────────────────────────────────────────

  - description: "simplify command: description and scope options"
    vars:
      prompt_content: file://plugins/tt-core/commands/simplify.md
    assert:
      - type: icontains
        value: "Simplify and refine"
      - type: icontains
        value: "git diff --name-only HEAD~1"
      - type: icontains
        value: "staged"

  - description: "simplify command: refinement rules"
    vars:
      prompt_content: file://plugins/tt-core/commands/simplify.md
    assert:
      - type: icontains
        value: "complexity"
      - type: icontains
        value: "redundant"
      - type: icontains
        value: "clarity over brevity"

  # ── commands/claude.md ───────────────────────────────────────────────

  - description: "claude command: title and tools"
    vars:
      prompt_content: file://plugins/tt-core/commands/claude.md
    assert:
      - type: icontains
        value: "title: claude"
      - type: icontains
        value: "Bash(*)"
      - type: icontains
        value: "Task(*)"

  - description: "claude command: launch modes and rules"
    vars:
      prompt_content: file://plugins/tt-core/commands/claude.md
    assert:
      - type: icontains
        value: "Ralph plan"
      - type: icontains
        value: "feature branch"
      - type: icontains
        value: "--dangerously-skip-permissions"
